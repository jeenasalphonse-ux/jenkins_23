<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passenger Details | SmartTravel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --brand: #ff5e57;
      --brand-dark: #e74c3c;
      --text-dark: #333333;
    }
    /* Your original navbar styles */
    .navbar {
      background-color: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
    }
    .booking-header {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('bus-bg.jpg');
      background-size: cover;
      color: white;
      padding: 4rem 0;
      margin-bottom: 2rem;
    }
    .passenger-card {
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .summary-card {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 2rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }
    .price-tag {
      font-weight: bold;
      color: var(--brand);
    }
    .btn-confirm {
      background-color: var(--brand);
      color: white;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-confirm:hover {
      background-color: var(--brand-dark);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255, 94, 87, 0.4);
    }
  </style>
</head>
<body>
  <!-- Navigation (Same as before) -->
  <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
    <!-- Your original navbar content -->
  </nav>

  <!-- Header -->
  <div class="booking-header text-center">
    <div class="container">
      <h1>Passenger Details</h1>
      <p>Complete your booking information</p>
    </div>
  </div>

  <div class="container">
    <div class="row">
      <!-- Passenger Form -->
      <div class="col-lg-7">
        <div class="passenger-card">
          <form id="passenger-form">
            <div id="passenger-fields">
              <!-- Dynamically generated fields -->
            </div>
            
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" required>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Mobile Number</label>
              <input type="tel" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-confirm w-100">
              <i class="bi bi-lock"></i> Proceed to Payment
            </button>
          </form>
        </div>
      </div>
      
      <!-- Booking Summary -->
      <div class="col-lg-5">
        <div class="summary-card sticky-top" style="top: 20px;">
          <h4 class="mb-3">Booking Summary</h4>
          <p><strong>Bus:</strong> Luxury Coach</p>
          <p><strong>Route:</strong> Chennai to Coimbatore</p>
          <p><strong>Date:</strong> 15 July 2025</p>
          <p><strong>Departure:</strong> 8:30 PM</p>
          <hr>
          <div id="seats-summary"></div>
          <hr>
          <h4 class="price-tag">Total: <span id="total-fare"></span></h4>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer (Same as before) -->
  <footer class="pt-5 pb-4">
    <!-- Your original footer content -->
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const selectedSeats = JSON.parse(sessionStorage.getItem('selectedSeats')) || [];
      const totalFare = sessionStorage.getItem('totalFare') || 0;
      
      // Generate passenger fields
      const passengerFields = document.getElementById('passenger-fields');
      const seatsSummary = document.getElementById('seats-summary');
      
      selectedSeats.forEach((seat, index) => {
        passengerFields.innerHTML += `
          <div class="mb-4">
            <h5>Passenger for Seat ${seat}</h5>
            <div class="row g-2">
              <div class="col-md-6">
                <input type="text" class="form-control" placeholder="Full Name" required>
              </div>
              <div class="col-md-6">
                <input type="number" class="form-control" placeholder="Age" required>
              </div>
              <div class="col-md-12 mt-2">
                <select class="form-select">
                  <option>Male</option>
                  <option>Female</option>
                  <option>Other</option>
                </select>
              </div>
            </div>
          </div>
        `;
        
        seatsSummary.innerHTML += `<p>Seat ${seat}: ₹850</p>`;
      });
      
      document.getElementById('total-fare').textContent = `₹${totalFare}`;
      
      // Form submission
      document.getElementById('passenger-form').addEventListener('submit', function(e) {
        e.preventDefault();
        window.location.href = 'payment.html';
      });
    });
  </script>
</body>
</html>
