<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Grand Chennai – Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #fff5f5, #fceae8);
      padding-top: 80px;
    }
    .navbar {
      background-color: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
    }
    .navbar-brand, .nav-link {
      color: #070707 !important;
      font-weight: 500;
    }
    .form-section {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .price-tag { color:#149bb1; font-weight:600; }
    .map-section { display:none; margin-top:20px; }
    #map { height: 300px; border-radius:12px; }
    .hotel-img-top {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="#">SmartTravel</a>
      <button class="navbar-toggler bg-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav me-2">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-door"></i> Home</a></li>
          <li class="nav-item"><a class="nav-link" href="Hotels-details.html"><i class="bi bi-building"></i> Hotels</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="form-section">
      <img src="images/h4.jpg" class="hotel-img-top" alt="The Grand Chennai Image">
      <h2 class="mb-4">Book Your Stay at The Grand Chennai</h2>
      <p class="price-tag">Base Price: ₹3,500 / night</p>

      <form id="bookingForm">
        <div class="mb-3">
          <label class="form-label">Include Food?</label><br>
          <input type="radio" name="food" value="yes" id="foodYes"> <label for="foodYes">Yes (₹800)</label><br>
          <input type="radio" name="food" value="no" id="foodNo"> <label for="foodNo">No</label>
        </div>

        <div id="foodSuggestSection" class="mb-3" style="display:none;">
          <label class="form-label">Need suggestions for nearby food?</label><br>
          <input type="radio" name="suggest" value="yes" id="suggestYes"> <label for="suggestYes">Yes</label><br>
          <input type="radio" name="suggest" value="no" id="suggestNo"> <label for="suggestNo">No</label>
        </div>

        <div class="map-section" id="mapSection">
          <h5 class="mt-3 mb-2">Nearby Food Spots</h5>
          <div id="map"></div>
        </div>

        <button type="button" class="btn btn-danger mt-4" onclick="generateBill()">Generate PDF Bill</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const form = document.getElementById('bookingForm');
    const mapDiv = document.getElementById('map');
    const mapSection = document.getElementById('mapSection');
    const foodSuggest = document.getElementById('foodSuggestSection');
    const hotelLat = 13.0606;
    const hotelLng = 80.2498;
    let leafletMap;

    form.addEventListener('change', () => {
      const foodChoice = form.food.value;
      const suggestChoice = form.suggest?.value;

      if (foodChoice === 'no') {
        foodSuggest.style.display = 'block';
      } else {
        foodSuggest.style.display = 'none';
        mapSection.style.display = 'none';
      }

      if (foodChoice === 'no' && suggestChoice === 'yes') {
        mapSection.style.display = 'block';
        if (!leafletMap) initMap();
      } else {
        mapSection.style.display = 'none';
      }
    });

    function initMap() {
      leafletMap = L.map('map').setView([hotelLat, hotelLng], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(leafletMap);

      L.marker([hotelLat, hotelLng]).addTo(leafletMap).bindPopup('The Grand Chennai');

      fetch(`https://overpass-api.de/api/interpreter?data=[out:json];node[amenity=restaurant](around:1000,${hotelLat},${hotelLng});out;`)
        .then(r => r.json())
        .then(data => {
          if (data?.elements?.length === 0) {
            alert('No restaurants found nearby.');
            return;
          }
          data.elements.forEach(place => {
            if (place.lat && place.lon) {
              const name = place.tags?.name || 'Unnamed Restaurant';
              L.marker([place.lat, place.lon]).addTo(leafletMap).bindPopup(name);
            }
          });
        })
        .catch(err => console.error('Overpass API error:', err));
    }

    function generateBill() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const basePrice = 3500;
      const foodIncluded = form.food.value === 'yes';
      const total = foodIncluded ? basePrice + 800 : basePrice;

      doc.setFontSize(16);
      doc.text('SmartTravel – Booking Receipt', 20, 20);
      doc.setFontSize(12);
      doc.text('Hotel: The Grand Chennai', 20, 40);
      doc.text(`Room Charge: ₹${basePrice}`, 20, 50);
      doc.text(`Food Included: ${foodIncluded ? 'Yes (₹800)' : 'No'}`, 20, 60);
      doc.text(`Total: ₹${total}`, 20, 80);
      doc.save('booking_receipt.pdf');
    }
  </script>
</body>
</html>
