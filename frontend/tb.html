<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Seats | SmartTravel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --brand: #ff5e57;
      --brand-dark: #e74c3c;
      --text-dark: #333333;
      --card-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
    }

    /* Your original navbar */
    .navbar {
      background-color: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
    }
    .navbar-brand {
      font-weight: 600;
      color: var(--text-dark) !important;
    }

    /* Enhanced hero section */
    .booking-header {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('bus-interior-wide.jpg');
      background-size: cover;
      background-position: center;
      color: white;
      padding: 5rem 0;
      margin-bottom: 2rem;
      text-align: center;
    }
    .booking-header h1 {
      font-weight: 700;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
    }

    /* Seat map container */
    .seat-map-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
      background: white;
      border-radius: 15px;
      box-shadow: var(--card-shadow);
    }

    /* Elegant seat design */
    .seat {
      width: 42px;
      height: 42px;
      margin: 0 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f9fa;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
      border: 1px solid #e9ecef;
    }
    .seat:hover:not(.booked) {
      transform: translateY(-2px);
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }
    .seat.selected {
      background: var(--brand);
      color: white;
      border-color: var(--brand-dark);
      box-shadow: 0 4px 10px rgba(255, 94, 87, 0.3);
    }
    .seat.booked {
      background: #f1f3f5;
      color: #adb5bd;
      cursor: not-allowed;
      position: relative;
    }
    .seat.booked::after {
      content: "";
      position: absolute;
      width: 80%;
      height: 1px;
      background: #adb5bd;
      transform: rotate(-45deg);
    }

    /* Layout styling */
    .seat-row {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 1rem;
    }
    .left-seats {
      display: flex;
      margin-right: 30px;
    }
    .right-seats {
      display: flex;
      margin-left: 30px;
    }
    .aisle-space {
      width: 60px;
      text-align: center;
      color: #adb5bd;
    }

    /* Your original price display */
    .price-summary {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 2.5rem;
      box-shadow: var(--card-shadow);
      text-align: center;
    }
    .price-tag {
      font-weight: 700;
      color: var(--brand);
      font-size: 1.4rem;
    }

    /* Your original button */
    .btn-brand {
      background-color: var(--brand);
      color: white;
      padding: 0.75rem 2.5rem;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-top: 1rem;
    }
    .btn-brand:hover {
      background-color: var(--brand-dark);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(231, 76, 60, 0.3);
    }
    .btn-brand:disabled {
      background-color: #cccccc;
      transform: none;
      box-shadow: none;
    }

    /* Your original footer */
    footer {
      background-color: #101820;
      color: white;
      padding: 3rem 0;
      margin-top: 4rem;
    }
  </style>
</head>
<body>
  <!-- Your Original Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="#">
        <i class="bi bi-compass me-2"></i>SmartTravel
      </a>
      <!-- Other nav items as per your design -->
    </div>
  </nav>

  <!-- Enhanced Hero Section -->
  <div class="booking-header">
    <div class="container">
      <h1>Select Your Seats</h1>
      <p class="lead">Chennai → Coimbatore | Luxury AC Sleeper | 15 Jul 2025</p>
    </div>
  </div>

  <!-- Seat Selection -->
  <div class="container">
    <div class="seat-map-container">
      <!-- Bus Layout -->
      <div class="text-center mb-4">
        <div class="driver-cabin mb-4">
          <i class="bi bi-steering2 fs-4"></i>
        </div>
        
        <!-- 10 Rows of 2+3 Seating -->
        <div id="seat-map">
          <!-- Rows will be generated by JavaScript -->
        </div>
      </div>

      <!-- Your Original Price Summary -->
      <div class="price-summary">
        <h5>Selected <span id="selected-count">0</span> seats</h5>
        <h3 class="price-tag">Total: ₹<span id="total-price">0</span></h3>
        <button id="continue-btn" class="btn-brand" disabled>
          Continue to Passenger Details
        </button>
      </div>
    </div>
  </div>

  <!-- Your Original Footer -->
  <footer>
    <div class="container">
      <!-- Your footer content -->
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const seatMap = document.getElementById('seat-map');
      const selectedCount = document.getElementById('selected-count');
      const totalPrice = document.getElementById('total-price');
      const continueBtn = document.getElementById('continue-btn');
      
      let selectedSeats = [];
      const seatPrice = 850;
      
      // Generate 10 rows of 2+3 seating
      function generateSeatMap() {
        let html = '';
        
        for(let row = 1; row <= 10; row++) {
          html += `
          <div class="seat-row">
            <div class="left-seats">
              <div class="seat" data-seat="${row}A">${row}A</div>
              <div class="seat" data-seat="${row}B">${row}B</div>
            </div>
            
            <div class="aisle-space">
              <i class="bi bi-arrow-left-right"></i>
            </div>
            
            <div class="right-seats">
              <div class="seat" data-seat="${row}C">${row}C</div>
              <div class="seat" data-seat="${row}D">${row}D</div>
              <div class="seat" data-seat="${row}E">${row}E</div>
            </div>
          </div>`;
        }
        
        seatMap.innerHTML = html;
        markRandomBooked();
        setupSeatSelection();
      }
      
      // Mark random seats as booked (25% chance)
      function markRandomBooked() {
        document.querySelectorAll('.seat').forEach(seat => {
          if(Math.random() < 0.25) {
            seat.classList.add('booked');
          }
        });
      }
      
      // Seat selection logic
      function setupSeatSelection() {
        document.querySelectorAll('.seat:not(.booked)').forEach(seat => {
          seat.addEventListener('click', function() {
            const seatNum = this.getAttribute('data-seat');
            
            if(this.classList.contains('selected')) {
              this.classList.remove('selected');
              selectedSeats = selectedSeats.filter(s => s !== seatNum);
            } else {
              this.classList.add('selected');
              selectedSeats.push(seatNum);
            }
            
            updateSummary();
          });
        });
      }
      
      // Update summary display
      function updateSummary() {
        selectedCount.textContent = selectedSeats.length;
        totalPrice.textContent = selectedSeats.length * seatPrice;
        continueBtn.disabled = selectedSeats.length === 0;
        
        // Store for next page
        sessionStorage.setItem('selectedSeats', JSON.stringify(selectedSeats));
        sessionStorage.setItem('totalFare', selectedSeats.length * seatPrice);
      }
      
      // Initialize
      generateSeatMap();
      
      // Continue button handler
      continueBtn.addEventListener('click', function() {
        window.location.href = 'bus-passenger.html';
      });
    });
  </script>
</body>
</html>
