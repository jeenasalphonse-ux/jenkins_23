<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travelista Tours - Sign Up</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #f5f7fa, #dfe9f3);
    padding: 20px;
}
.container {
    display: flex;
    width: 950px;
    height: 700px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    transition: transform 0.3s;
}
.container:hover {
    transform: translateY(-5px);
}
.left-panel {
    flex: 1.2;
    background: url('images/login1.jpg') center/cover no-repeat;
    position: relative;
}
.left-panel::after {
    content: "Travelista Tours";
    position: absolute;
    bottom: 20px;
    left: 20px;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 5px rgba(0,0,0,0.5);
}
.right-panel {
    flex: 1;
    padding: 50px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.right-panel h1 {
    color: #355162;
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 25px;
    text-align: center;
}
.input-group {
    margin-bottom: 18px;
    position: relative;
}
.input-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
    color: #0e093b;
}
.input-group input {
    width: 100%;
    padding: 13px 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
    transition: border 0.3s, box-shadow 0.3s;
}
.input-group input:focus {
    border-color: #355162;
    outline: none;
    box-shadow: 0 0 8px rgba(53, 81, 98, 0.3);
}
.show-pass {
    position: absolute;
    top: 38px;
    right: 12px;
    cursor: pointer;
    color: #355162;
}
.signup-btn {
    background: #355162;
    color: white;
    border: none;
    padding: 15px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s, transform 0.3s;
    width: 100%;
    margin-top: 10px;
}
.signup-btn:hover {
    background: #2a4050;
    transform: translateY(-2px);
}
.register {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    color: #555;
}
.register a {
    color: #355162;
    font-weight: 600;
    text-decoration: none;
}
.register a:hover {
    text-decoration: underline;
}
.checkbox-group {
    display: flex;
    align-items: center;
    font-size: 14px;
    margin-bottom: 15px;
}
.checkbox-group input {
    margin-right: 8px;
}
@media (max-width: 900px) {
    .container {
        flex-direction: column;
        width: 100%;
        height: auto;
    }
    .left-panel {
        height: 200px;
    }
}
</style>
</head>
<body>
<!-- Navigation -->
<nav class="navbar navbar-expand-lg fixed-top shadow-sm" style="background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); z-index: 1000;">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-semibold" href="index.html" style="color: #355162 !important;">SmartTravel</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav me-2">
        <li class="nav-item"><a class="nav-link" href="index.html" style="color: #355162 !important;"><i class="bi bi-house-door"></i> Home</a></li>
        <li class="nav-item"><a class="nav-link" href="plan-trip.html" style="color: #355162 !important;"><i class="bi bi-map-fill"></i> Plan Trip</a></li>
        <li class="nav-item"><a class="nav-link" href="login.html" style="color: #355162 !important;"><i class="bi bi-person-circle"></i> Login</a></li>
        <li class="nav-item"><a class="nav-link" href="dashboard.html" style="color: #355162 !important;"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container" style="margin-top: 80px;">
    <div class="left-panel"></div>
    <div class="right-panel">
        <h1>Create Account</h1>

        <div class="input-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="John Doe">
        </div>

        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Your username">
        </div>

        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>

        <div class="input-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="123-456-7890">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="********">
            <i class="fas fa-eye show-pass" id="togglePass"></i>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms">
            <label for="terms">I accept the <a href="#">Terms & Conditions</a></label>
        </div>


        <button class="signup-btn" id="signup-btn">Sign Up</button>

        <div class="register">
            Already have an account? <a href="login.html">Login Here</a>
        </div>
    </div>
</div>

<script>
document.getElementById('signup-btn').addEventListener('click', async () => {
    const name = document.getElementById('name').value.trim();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value.trim();
    const terms = document.getElementById('terms').checked;

    if(!name || !username || !email || !phone || !password) {
        alert('Please fill all fields');
        return;
    }

    if(!terms) {
        alert('You must accept the Terms & Conditions');
        return;
    }

    // Send data as JSON instead of FormData
    const userData = { name, username, email, phone, password };

    try {
        const res = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        });

        const data = await res.json();
        alert(data.msg);

        if(res.status === 201){
            // Save username in localStorage
            localStorage.setItem('username', name);
            // Redirect to login page
            window.location.href = '/login';
        }

    } catch(err) {
        console.error(err);
        alert('Error connecting to server');
    }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
